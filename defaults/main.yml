---
jumpcloud_directory: /opt/jc
jumpcloud_ca_cert: "{{ jumpcloud_directory }}/ca.crt"
jumpcloud_client_cert: "{{ jumpcloud_directory }}/client.crt"
jumpcloud_client_key: "{{ jumpcloud_directory }}/client.key"
jumpcloud_agent_config: "{{ jumpcloud_directory }}/jcagent.conf"
jumpcloud_x_connect_key: "{{ enc_jumpcloud_x_connect_key | default('') }}"
jumpcloud_api_key: "{{ enc_jumpcloud_api_key | default('') }}"
jumpcloud_x_connect_url: "https://kickstart.jumpcloud.com/Kickstart"
jumpcloud_kickstart_script: "/tmp/Kickstart.sh"
jumpcloud_install_timeout_seconds: 300
jumpcloud_registration_timeout_seconds: 180
jumpcloud_api_v1_url: "https://console.jumpcloud.com/api"
jumpcloud_api_v2_url: "https://console.jumpcloud.com/api/v2"
jumpcloud_agent_service: jcagent
jumpcloud_force_install: false
jumpcloud_use_sudo: false
jumpcloud_validate_supported_distribution: true
jumpcloud_delete_duplicate_systems: true
jumpcloud_create_missing_system_groups: false

# Defaults for new hosts.
jumpcloud_display_name: "{{ inventory_hostname }}"
jumpcloud_allow_public_key_authentication: true
jumpcloud_allow_ssh_password_authentication: true
jumpcloud_allow_ssh_root_login: true
jumpcloud_allow_multi_factor_authentication: false

jumpcloud_supported_linux_versions:
  Amazon:
    - "2"
    - "2023"
  Debian:
    - "11"
    - "12"
  Fedora:
    - "40"
    - "41"
    - "42"
  OracleLinux:
    - "9"
  Pop!_OS:
    - "22"
  RedHat:
    - "8"
    - "9"
  Rocky:
    - "8"
    - "9"
  Ubuntu:
    - "18"
    - "20"
    - "22"
    - "24"
    - "26"

jumpcloud_dependencies: []
jumpcloud_common_dependencies:
  - grep
  - lsof
  - openssl
  - sudo
  - tar
jumpcloud_apt_dependencies:
  - curl
  - dpkg
  - hostname
  - libc-bin
  - libnss3
  - libnss3-tools
  - lsb-release
  - mawk
  - passwd
  - procps
  - sysvinit-utils
jumpcloud_debian_dependencies:
  - cron
  - libpam-modules
  - libpam-runtime
  - psmisc
  - rsyslog
  - systemd
jumpcloud_ubuntu_dependencies: []
jumpcloud_yum_dependencies:
  - findutils
  - gawk
  - glibc-common
  - initscripts
  - net-tools
  - nss-tools
  - psmisc
  - rpm
  - shadow-utils
  - util-linux
  - which
jumpcloud_dnf_dependencies:
  - curl
  - dnf
  - findutils
  - gawk
  - glibc-common
  - net-tools
  - nss
  - nss-tools
  - psmisc
  - rpm
  - rsyslog
  - shadow-utils
  - systemd
  - util-linux
  - util-linux-user
  - which
  - yum
jumpcloud_amazon_dependencies:
  - chkconfig
  - dmidecode
  - initscripts
  - redhat-lsb-core
jumpcloud_redhat_dependencies:
  - redhat-lsb-core
jumpcloud_fedora_dependencies:
  - audispd-plugins
  - dmidecode
  - policycoreutils
jumpcloud_oracle_dependencies:
  - audispd-plugins
  - policycoreutils
jumpcloud_rocky_dependencies:
  - policycoreutils
