---
- name: Download JumpCloud kickstart script
  ansible.builtin.get_url:
    url: "{{ jumpcloud_x_connect_url }}"
    dest: "{{ jumpcloud_kickstart_script }}"
    mode: "0755"
    headers:
      x-connect-key: "{{ jumpcloud_x_connect_key }}"
  become: "{{ jumpcloud_use_sudo }}"
  no_log: true

- name: Install JumpCloud agent
  ansible.builtin.command: >-
    /usr/bin/env timeout
    {{ jumpcloud_install_timeout_seconds | int }}
    /bin/bash
    {{ jumpcloud_kickstart_script }}
  args:
    creates: "{{ jumpcloud_agent_config }}"
  environment:
    APT_LISTCHANGES_FRONTEND: none
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
  become: "{{ jumpcloud_use_sudo }}"
  register: jumpcloud_install_result
  changed_when: jumpcloud_install_result.rc == 0
  failed_when: false
  no_log: true

- name: Check JumpCloud agent config again
  ansible.builtin.stat:
    path: "{{ jumpcloud_agent_config }}"
  register: jumpcloud_agent_config_status
  become: "{{ jumpcloud_use_sudo }}"

- name: Report JumpCloud agent config status
  ansible.builtin.debug:
    var: jumpcloud_agent_config_status
  when: debug | default(false) | bool

- name: Check again if JumpCloud has been initialized
  ansible.builtin.set_fact:
    jumpcloud_is_installed: >-
      {{
        jumpcloud_agent_config_status.stat.isreg is defined
        and jumpcloud_agent_config_status.stat.isreg
      }}

- name: Start JumpCloud agent when package install completed without config
  when: not jumpcloud_is_installed
  block:
    - name: Ensure JumpCloud agent service is enabled and started
      ansible.builtin.service:
        name: "{{ jumpcloud_agent_service }}"
        enabled: true
        state: started
      become: "{{ jumpcloud_use_sudo }}"
      register: jumpcloud_service_start_result
      failed_when: false

    - name: Wait for JumpCloud agent config after service start
      ansible.builtin.wait_for:
        path: "{{ jumpcloud_agent_config }}"
        timeout: "{{ jumpcloud_registration_timeout_seconds | int }}"
      become: "{{ jumpcloud_use_sudo }}"
      register: jumpcloud_agent_config_wait_result
      failed_when: false
      when: not jumpcloud_service_start_result.failed | default(false) | bool

    - name: Check JumpCloud agent config after service start
      ansible.builtin.stat:
        path: "{{ jumpcloud_agent_config }}"
      register: jumpcloud_agent_config_status
      become: "{{ jumpcloud_use_sudo }}"

    - name: Set whether JumpCloud initialized after service start
      ansible.builtin.set_fact:
        jumpcloud_is_installed: >-
          {{
            jumpcloud_agent_config_status.stat.isreg is defined
            and jumpcloud_agent_config_status.stat.isreg
          }}

- name: Fail when JumpCloud installer did not create the agent config
  ansible.builtin.fail:
    msg: >-
      The JumpCloud installer exited with code {{ jumpcloud_install_result.rc }}
      and did not create {{ jumpcloud_agent_config }}.
  when:
    - jumpcloud_install_result.rc != 0
    - not jumpcloud_is_installed

- name: Reset JumpCloud if jcagent.conf has not been created
  ansible.builtin.import_tasks: reset_jumpcloud.yml
  when: not jumpcloud_is_installed

- name: Ensure JumpCloud agent service is enabled and started
  ansible.builtin.service:
    name: "{{ jumpcloud_agent_service }}"
    enabled: true
    state: started
  become: "{{ jumpcloud_use_sudo }}"
  when: jumpcloud_is_installed
