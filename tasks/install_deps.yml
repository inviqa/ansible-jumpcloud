---
- name: Define JumpCloud dependencies for this platform
  ansible.builtin.set_fact:
    jumpcloud_dependencies: >-
      {{
        jumpcloud_common_dependencies
        + (jumpcloud_apt_dependencies if ansible_facts.pkg_mgr == "apt" else [])
        + (jumpcloud_debian_dependencies if ansible_facts.distribution == "Debian" else [])
        + (jumpcloud_ubuntu_dependencies if ansible_facts.distribution == "Ubuntu" else [])
        + (jumpcloud_yum_dependencies if ansible_facts.pkg_mgr == "yum" else [])
        + (jumpcloud_dnf_dependencies if ansible_facts.pkg_mgr == "dnf" else [])
        + (jumpcloud_amazon_dependencies if ansible_facts.distribution == "Amazon" else [])
        + (jumpcloud_redhat_dependencies if ansible_facts.distribution == "RedHat" else [])
        + (jumpcloud_fedora_dependencies if ansible_facts.distribution == "Fedora" else [])
        + (jumpcloud_oracle_dependencies if ansible_facts.distribution == "OracleLinux" else [])
        + (jumpcloud_rocky_dependencies if ansible_facts.distribution == "Rocky" else [])
      }}

- name: Normalize JumpCloud dependency list
  ansible.builtin.set_fact:
    jumpcloud_dependencies: "{{ jumpcloud_dependencies | unique | sort }}"

- name: Refresh APT package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: "{{ jumpcloud_use_sudo }}"
  when: ansible_facts.pkg_mgr == "apt"

- name: Report JumpCloud dependencies
  ansible.builtin.debug:
    var: jumpcloud_dependencies
  when: debug | default(false) | bool

- name: Install JumpCloud dependencies
  ansible.builtin.package:
    name: "{{ jumpcloud_dependencies }}"
    state: present
  become: "{{ jumpcloud_use_sudo }}"
  when: jumpcloud_dependencies | length > 0
