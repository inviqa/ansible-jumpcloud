---
- name: Validate target host support
  ansible.builtin.import_tasks: validate_prerequisites.yml

- name: Detect current JumpCloud installation state
  ansible.builtin.import_tasks: detect_install_state.yml

- name: Resolve requested JumpCloud system attributes
  ansible.builtin.import_tasks: resolve_system_attributes.yml

- name: Install JumpCloud when required
  ansible.builtin.include_tasks: install_agent.yml
  when:
    - not jumpcloud_is_installed or jumpcloud_force_install | bool

- name: Reconcile registered JumpCloud system state
  ansible.builtin.import_tasks: reconcile_registered_system.yml
  when: jumpcloud_is_installed or jumpcloud_force_install | bool
