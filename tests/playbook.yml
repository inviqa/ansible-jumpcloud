---
- name: Provision local JumpCloud test containers
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Install test containers when inventory requests them
      ansible.builtin.include_tasks: tasks/provision_containers.yml
      when: groups.get('jumpcloud_test_hosts', []) | length > 0

- name: Resolve DigitalOcean test credentials
  hosts: jumpcloud_test_hosts
  gather_facts: false
  pre_tasks:
    - name: Load local test overrides
      ansible.builtin.include_tasks: tasks/load_local_test_overrides.yml

    - name: Resolve DigitalOcean test variables
      ansible.builtin.include_tasks: tasks/resolve_digitalocean_test_context.yml
  tasks:
    - name: Provision DigitalOcean droplets when requested
      ansible.builtin.include_tasks: tasks/provision_digitalocean_droplet.yml
      when: jumpcloud_test_provision_droplets | default(false) | bool

- name: Install Python on DigitalOcean test droplets
  hosts: jumpcloud_test_hosts
  gather_facts: false
  tasks:
    - name: Install Python for Ansible on provisioned droplets
      ansible.builtin.include_tasks: tasks/install_python.yml
      when: jumpcloud_test_provision_droplets | default(false) | bool

- name: Validate JumpCloud role on supported Linux targets
  hosts: jumpcloud_test_hosts
  vars_files:
    - ../defaults/main.yml
  pre_tasks:
    - name: Load local test overrides
      ansible.builtin.include_tasks: tasks/load_local_test_overrides.yml

    - name: Resolve live test context
      ansible.builtin.include_tasks: tasks/resolve_live_test_context.yml

    - name: Validate JumpCloud live-test credentials when requested
      ansible.builtin.include_tasks: tasks/validate_jumpcloud_live_credentials.yml
      when: jumpcloud_test_run_agent_install | default(false) | bool
  tasks:
    - name: Run live JumpCloud role
      ansible.builtin.include_role:
        name: ansible-jumpcloud
      when: jumpcloud_test_run_agent_install | default(false) | bool

    - name: Run container-safe validation tasks
      ansible.builtin.include_tasks: tasks/container_preflight.yml
      when: not jumpcloud_test_run_agent_install | default(false) | bool

    - name: Run live validation tasks
      ansible.builtin.include_tasks: tasks/test_tasks.yml
      when: jumpcloud_test_run_agent_install | default(false) | bool
