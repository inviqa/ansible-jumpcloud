---
- name: Create or reuse the JumpCloud test droplet
  digitalocean.cloud.droplet:
    state: present
    name: "{{ digital_ocean_name }}"
    token: "{{ digital_ocean_api_token }}"
    size: "{{ digital_ocean_size_id }}"
    image: "{{ digital_ocean_image_id }}"
    region: "{{ digital_ocean_region_id }}"
    ssh_keys:
      - "{{ jumpcloud_test_do_ssh_key.fingerprint }}"
    tags:
      - "{{ jumpcloud_test_do_tag }}"
    unique_name: "{{ digital_ocean_unique_name | bool }}"
    timeout: 600
  delegate_to: localhost
  register: jumpcloud_test_do_create
  no_log: true

- name: Store DigitalOcean droplet metadata
  ansible.builtin.set_fact:
    jumpcloud_test_droplet_id: "{{ jumpcloud_test_do_create.droplet.id }}"
    jumpcloud_test_droplet_public_ip: >-
      {{
        (
          jumpcloud_test_do_create.droplet.networks.v4
          | selectattr('type', 'equalto', 'public')
          | list
          | first
        ).ip_address
      }}

- name: Set the public IP used for SSH
  ansible.builtin.set_fact:
    ansible_host: "{{ jumpcloud_test_droplet_public_ip }}"
