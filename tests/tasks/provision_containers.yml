---
- name: Ensure JumpCloud test container is running
  community.docker.docker_container:
    name: "{{ hostvars[item].ansible_host }}"
    image: "{{ hostvars[item].jumpcloud_container_image }}"
    command: /usr/sbin/init
    detach: true
    privileged: true
    cgroupns_mode: host
    state: started
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    env:
      container: docker
  loop: "{{ groups['jumpcloud_test_hosts'] }}"
  when: hostvars[item].jumpcloud_test_provision_containers | default(false) | bool

- name: Wait for JumpCloud test container connection
  ansible.builtin.wait_for_connection:
    timeout: 60
  delegate_to: "{{ item }}"
  loop: "{{ groups['jumpcloud_test_hosts'] }}"
  when: hostvars[item].jumpcloud_test_provision_containers | default(false) | bool
