---
- name: Check that the JumpCloud agent config exists
  ansible.builtin.stat:
    path: "{{ jumpcloud_agent_config }}"
  register: jumpcloud_test_agent_config

- name: Assert that the JumpCloud agent config exists
  ansible.builtin.assert:
    that:
      - jumpcloud_test_agent_config.stat.exists
    msg: "The JumpCloud agent config was not created at {{ jumpcloud_agent_config }}"

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Check that the JumpCloud agent service exists
  ansible.builtin.assert:
    that:
      - jumpcloud_agent_service + '.service' in ansible_facts.services
        or jumpcloud_agent_service in ansible_facts.services
    msg: "The JumpCloud agent service is not present."

- name: Refresh JumpCloud registration status
  ansible.builtin.include_role:
    name: ansible-jumpcloud
    tasks_from: check_system_registration

- name: Check that the host has been added to JumpCloud
  ansible.builtin.assert:
    that:
      - jc_system_is_registered | bool
    msg: "The host {{ jumpcloud_effective_display_name }} has not been registered to JumpCloud"
  delegate_to: localhost

- name: Check that the registered host name matches the requested display name
  ansible.builtin.assert:
    that:
      - jc_system_attributes_json_response.json.displayName == jumpcloud_effective_display_name
    msg: >-
      The host should be named {{ jumpcloud_effective_display_name }} but is present in
      JumpCloud as {{ jc_system_attributes_json_response.json.displayName }}.
  when: jc_system_is_registered | bool
  delegate_to: localhost

- name: Check that JumpCloud SSH attributes match the requested values
  ansible.builtin.assert:
    that:
      - jc_system_attributes_json_response.json.allowPublicKeyAuthentication
        == (jumpcloud_effective_allow_public_key_authentication | bool)
      - jc_system_attributes_json_response.json.allowSshPasswordAuthentication
        == (jumpcloud_effective_allow_ssh_password_authentication | bool)
      - jc_system_attributes_json_response.json.allowSshRootLogin
        == (jumpcloud_effective_allow_ssh_root_login | bool)
      - jc_system_attributes_json_response.json.allowMultiFactorAuthentication
        == (jumpcloud_effective_allow_multi_factor_authentication | bool)
    msg: "JumpCloud SSH attributes do not match the requested role variables."
  when: jc_system_is_registered | bool
  delegate_to: localhost

- name: Check that the host is member of the required groups
  ansible.builtin.include_role:
    name: ansible-jumpcloud
    tasks_from: verify_system_groups
  when:
    - jumpcloud_system_groups | default([]) | length > 0
    - jc_system_groups is defined
