---
- name: Read the original container OS release
  ansible.builtin.slurp:
    src: /etc/os-release
  register: jumpcloud_test_original_os_release

- name: Inspect the original container OS release path
  ansible.builtin.stat:
    path: /etc/os-release
    follow: false
  register: jumpcloud_test_original_os_release_path

- name: Apply temporary unsupported-release install identity
  ansible.builtin.include_role:
    name: ansible-jumpcloud
    tasks_from: apply_install_os_release_identity
  vars:
    jumpcloud_install_on_unsupported_distribution: true

- name: Read the temporary container OS release
  ansible.builtin.slurp:
    src: /etc/os-release
  register: jumpcloud_test_temporary_os_release

- name: Validate the temporary identity uses the latest supported Debian release
  ansible.builtin.assert:
    that:
      - "'VERSION_ID=\"12\"' in (jumpcloud_test_temporary_os_release.content | b64decode)"
      - "'VERSION=\"12 (bookworm)\"' in (jumpcloud_test_temporary_os_release.content | b64decode)"
    fail_msg: >-
      The temporary JumpCloud install identity did not use the latest supported
      Debian release.

- name: Restore the original container OS release
  ansible.builtin.include_role:
    name: ansible-jumpcloud
    tasks_from: restore_install_os_release_identity

- name: Read the restored container OS release
  ansible.builtin.slurp:
    src: /etc/os-release
  register: jumpcloud_test_restored_os_release

- name: Inspect the restored container OS release path
  ansible.builtin.stat:
    path: /etc/os-release
    follow: false
  register: jumpcloud_test_restored_os_release_path

- name: Check that temporary OS release backup was removed
  ansible.builtin.stat:
    path: "{{ jumpcloud_install_os_release_backup }}"
  register: jumpcloud_test_os_release_backup_status

- name: Check that temporary OS release symlink target backup was removed
  ansible.builtin.stat:
    path: "{{ jumpcloud_install_os_release_backup }}.symlink-target"
  register: jumpcloud_test_os_release_link_backup_status

- name: Validate the original OS release has been restored
  ansible.builtin.assert:
    that:
      - jumpcloud_test_restored_os_release.content == jumpcloud_test_original_os_release.content
      - >-
        jumpcloud_test_restored_os_release_path.stat.islnk | default(false)
        == jumpcloud_test_original_os_release_path.stat.islnk | default(false)
      - >-
        not jumpcloud_test_original_os_release_path.stat.islnk | default(false)
        or jumpcloud_test_restored_os_release_path.stat.lnk_source
        == jumpcloud_test_original_os_release_path.stat.lnk_source
      - not jumpcloud_test_os_release_backup_status.stat.exists
      - not jumpcloud_test_os_release_link_backup_status.stat.exists
    fail_msg: "The temporary JumpCloud install identity was not restored."
