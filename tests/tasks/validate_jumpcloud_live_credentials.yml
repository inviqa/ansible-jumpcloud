---
- name: Check whether JumpCloud live test credentials are available
  ansible.builtin.assert:
    that:
      - jumpcloud_x_connect_key | length > 0
      - jumpcloud_api_key | length > 0
    fail_msg: >-
      Set JUMPCLOUD_X_CONNECT_KEY and JUMPCLOUD_API_KEY, or copy
      tests/test_variables.example.yml to tests/test_variables.yml and fill the
      local values before running the live test harness.

- name: Validate the JumpCloud API key for live tests
  ansible.builtin.uri:
    url: "{{ jumpcloud_api_v1_url }}/systems"
    headers:
      Content-Type: application/json
      Accept: application/json
      x-api-key: "{{ jumpcloud_api_key }}"
    method: GET
    status_code:
      - 200
      - 401
    return_content: true
    timeout: 60
  delegate_to: localhost
  become: false
  register: jumpcloud_test_account_auth_check
  no_log: true
  failed_when: false

- name: Check whether the JumpCloud API key can authenticate tests
  ansible.builtin.assert:
    that:
      - jumpcloud_test_account_auth_check.status == 200
    fail_msg: >-
      The configured JumpCloud API key could not authenticate. Update
      tests/test_variables.yml or export a valid JUMPCLOUD_API_KEY before
      running the live test harness.
